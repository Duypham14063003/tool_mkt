services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-social_dashboard}
      MYSQL_USER: ${MYSQL_USER:-social_dashboard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-social_dashboard_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-social_dashboard_root_password}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - social_dashboard_mysql:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

volumes:
  social_dashboard_mysql:
